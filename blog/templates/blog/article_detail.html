{% extends 'blog/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h1>{{ article.title }}</h1>
        <p><strong>Автор:</strong> {{ article.author.username }}</p>
        <p><strong>Категория:</strong> {{ article.category.name }}</p>
        <p><strong>Дата:</strong> {{ article.created_at|date:"d.m.Y" }}</p>
        <p><strong>Просмотров:</strong> {{ article.views }}</p>
        
        <hr>
        
        <div class="mb-4">
    {{ article.content|safe|linebreaks }}
</div>
        
        <a href="{% url 'blog:article_list' %}" class="btn btn-secondary">← Назад к списку</a>
    </div>
</div>
{% endblock %}
