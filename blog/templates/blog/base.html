<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jurassic Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'blog:article_list' %}">🦕 Динозавры</a>
            <div>
                {% if user.is_authenticated %}
                    <span class="text-light me-3">{{ user.username }}</span>
                    <a href="{% url 'users:profile' %}" class="btn btn-outline-light btn-sm">Профиль</a>
                    <a href="{% url 'users:logout' %}" class="btn btn-danger btn-sm">Выйти</a>
                {% else %}
                    <a href="{% url 'users:login' %}" class="btn btn-primary btn-sm">Войти</a>
                    <a href="{% url 'users:register' %}" class="btn btn-success btn-sm">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
